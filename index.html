<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mess Oracle 🍽️</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
</head>
<body>

  <div class="grain"></div>

  <header>
    <div class="header-inner">
      <button class="logo" onclick="resetAll()" aria-label="Go to home">
        <span class="logo-icon">⟡</span>
        <span class="logo-text">MESS ORACLE</span>
      </button>
      <div class="tagline">Your daily mess food verdict</div>
      <a class="github-link" href="https://github.com/kayvour/mess-oracle" target="_blank" rel="noopener" aria-label="View on GitHub">
        <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
          <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/>
        </svg>
      </a>
    </div>
  </header>

  <main>

    <!-- Step 1: Day Selector -->
    <section class="step active" id="step-day">
      <div class="step-label">01 — WHEN ARE YOU EATING?</div>
      <h2>Pick the day</h2>
      <div class="day-grid" id="day-grid"></div>
    </section>

    <!-- Step 2: Meal Selector -->
    <section class="step" id="step-meal">
      <div class="step-label">02 — WHICH MEAL?</div>
      <h2>Pick the meal</h2>
      <div class="meal-grid" id="meal-grid"></div>
      <button class="back-btn" onclick="goBack('step-day')">← back</button>
    </section>

    <!-- Step 3: Preferences -->
    <section class="step" id="step-prefs">
      <div class="step-label">03 — YOUR PREFERENCES</div>
      <h2>Tell us about yourself</h2>

      <div class="pref-card">
        <div class="pref-title">Are you vegetarian?</div>
        <div class="toggle-group">
          <button class="toggle active" data-pref="veg" data-val="veg">🥦 Pure Veg</button>
          <button class="toggle" data-pref="veg" data-val="both">🍗 Both Fine</button>
        </div>
      </div>

      <div class="pref-card">
        <div class="pref-title">Spice tolerance</div>
        <div class="toggle-group">
          <button class="toggle active" data-pref="spice" data-val="low">😌 Mild</button>
          <button class="toggle" data-pref="spice" data-val="medium">🔥 Medium</button>
          <button class="toggle" data-pref="spice" data-val="high">💀 Bring It</button>
        </div>
      </div>

      <div class="pref-card">
        <div class="pref-title">What are you craving?</div>
        <div class="toggle-group wrap">
          <button class="toggle active" data-pref="craving" data-val="any">🎲 Anything</button>
          <button class="toggle" data-pref="craving" data-val="rice">🍚 Rice</button>
          <button class="toggle" data-pref="craving" data-val="bread">🫓 Roti/Bread</button>
          <button class="toggle" data-pref="craving" data-val="light">🥗 Light Meal</button>
          <button class="toggle" data-pref="craving" data-val="protein">💪 Protein-heavy</button>
        </div>
      </div>

      <div class="pref-card">
        <div class="pref-title">Fitness goal today?</div>
        <div class="toggle-group">
          <button class="toggle active" data-pref="goal" data-val="maintenance">⚖️ Maintain</button>
          <button class="toggle" data-pref="goal" data-val="bulk">📈 Bulk</button>
          <button class="toggle" data-pref="goal" data-val="cut">📉 Cut</button>
        </div>
      </div>

      <button class="cta-btn" id="judge-btn" onclick="judgeTheMess()">
        <span>Give me the verdict</span>
        <span class="arrow">→</span>
      </button>
      <button class="back-btn" onclick="goBack('step-meal')">← back</button>
    </section>

    <!-- Step 4: Verdict -->
    <section class="step" id="step-verdict">
      <div class="step-label">04 — THE VERDICT IS IN</div>

      <div id="verdict-banner"></div>

      <div id="items-breakdown"></div>

      <div id="macros-section"></div>

      <div id="outside-suggestion"></div>

      <div id="pro-tip"></div>

      <button class="cta-btn secondary" onclick="resetAll()">
        <span>Judge another meal</span>
        <span class="arrow">↺</span>
      </button>
    </section>

  </main>

  <script src="menu.js"></script>
  <script src="logic.js"></script>
  <script src="app.js"></script>
</body>
</html>
